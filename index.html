<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Grid Generator</title>
<style>
:root{color-scheme:dark;--bg:#101217;--panel:#191c23;--panel2:#232832;--text:#f5f7fb;--muted:#abb2bf;--accent:#ff4f87;--border:#39404c}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(160deg,#0e1014,#181c25);color:var(--text);font-family:Inter,system-ui,sans-serif;padding-bottom:84px}
.app{width:min(1280px,calc(100% - 24px));margin:auto;padding:22px 0 36px}
h1{margin:0 0 6px;font-size:clamp(1.7rem,4vw,2.7rem)}
.subtitle{margin:0 0 18px;color:var(--muted)}
.layout{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
.panel,.group{background:rgba(25,28,35,.96);border:1px solid var(--border);border-radius:16px}
.controls{padding:14px;display:grid;gap:14px}
.group{padding:14px;display:grid;gap:12px}
.group h2{margin:0;font-size:1rem}
.field{display:grid;gap:7px}
label{font-size:.9rem;font-weight:650;color:var(--muted)}
input[type=file],select,button{width:100%;min-height:46px;border-radius:11px;font:inherit}
input[type=file],select{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:10px}
input[type=range]{width:100%;accent-color:var(--accent);touch-action:pan-y}
button{border:0;font-weight:750;cursor:pointer}
.primary{background:var(--accent);color:#fff}
.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.mode-buttons,.buttons{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mode-buttons button.active{background:var(--accent);color:#fff;border-color:transparent}
.hint,.status{color:var(--muted);font-size:.84rem;line-height:1.4}
.stage{padding:10px;overflow:auto;background:#11141a;position:sticky;top:0}
canvas{display:block;max-width:100%;height:auto;margin:auto;background:#0b0c0f;border-radius:10px;touch-action:none;cursor:grab}
canvas.dragging{cursor:grabbing}
details summary{cursor:pointer;font-weight:750}
details[open] summary{margin-bottom:12px}
.advanced-grid{display:grid;gap:12px}
.inline{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check{display:flex;align-items:center;gap:9px;color:var(--text)}
.check input{width:18px;height:18px}
.mobile-toolbar{display:none}
@media(max-width:900px){
  .app{width:calc(100% - 12px);padding-top:8px}
  h1{font-size:1.45rem}.subtitle{font-size:.88rem;margin-bottom:10px}
  .layout{display:flex;flex-direction:column;gap:10px}
  .stage{order:1;width:100%;max-height:62vh;z-index:5}
  canvas{max-height:58vh}
  .controls{order:2;width:100%}
  .mobile-toolbar{display:grid;grid-template-columns:1fr 1fr .7fr .7fr .9fr .9fr;gap:6px;position:fixed;left:6px;right:6px;bottom:6px;z-index:50;padding:7px;background:rgba(25,28,35,.98);border:1px solid var(--border);border-radius:15px}
  .mobile-toolbar button{min-height:48px;font-size:.8rem;padding:6px}
  .mobile-toolbar .active{background:var(--accent);color:#fff}
}
</style>
</head>
<body>
<main class="app">
  <h1>Image Grid Generator</h1>
  <p class="subtitle">Bild ausrichten, Raster platzieren und als Set exportieren.</p>

  <section class="layout">
    <aside class="panel controls">
      <section class="group">
        <h2>Bild</h2>
        <div class="field">
          <label for="imageInput">Bild auswählen</label>
          <input id="imageInput" type="file" accept="image/*">
        </div>
        <div class="field">
          <label for="canvasFormat">Bildformat / Seitenverhältnis</label>
          <select id="canvasFormat">
            <option value="1200x1200">1:1 Quadrat</option>
            <option value="1200x1500">4:5 Hochformat</option>
            <option value="1200x1600">3:4 Hochformat</option>
            <option value="1080x1920">9:16 Story</option>
            <option value="1600x900">16:9 Querformat</option>
            <option value="1600x1200">4:3 Querformat</option>
            <option value="1414x2000">A4 Hochformat</option>
            <option value="2000x1414">A4 Querformat</option>
          </select>
        </div>
        <div class="field">
          <label>Bild zoomen: <span id="zoomValue">100 %</span></label>
          <input id="imageZoom" type="range" min="10" max="400" value="100">
        </div>
        <div class="field">
          <label>Bild drehen: <span id="rotationValue">0°</span></label>
          <input id="imageRotation" type="range" min="-180" max="180" value="0">
        </div>
        <div class="mode-buttons">
          <button id="imageMode" class="secondary active" type="button">Bild verschieben</button>
          <button id="gridMode" class="secondary" type="button">Raster verschieben</button>
        </div>
        <div class="hint">Im Bild direkt ziehen. Im Rastermodus kannst du das Raster ziehen und am großen Griff unten rechts skalieren.</div>
      </section>

      <section class="group">
        <h2>Raster</h2>
        <div class="field">
          <label for="gridSize">Rastergröße</label>
          <select id="gridSize">
            <option value="2">2 × 2</option><option value="3">3 × 3</option>
            <option value="4">4 × 4</option><option value="5">5 × 5</option>
            <option value="6">6 × 6</option><option value="7">7 × 7</option>
            <option value="8">8 × 8</option><option value="9">9 × 9</option>
            <option value="10" selected>10 × 10</option>
          </select>
        </div>
        <div class="field">
          <label>Raster skalieren: <span id="cellSizeValue">90 px</span></label>
          <input id="cellSize" type="range" min="30" max="220" value="90">
        </div>
        <button id="centerGrid" class="secondary" type="button">Raster zentrieren</button>
      </section>

      <section class="group">
        <h2>Export</h2>
        <div class="buttons">
          <button id="download" class="primary" type="button">PNG</button>
          <button id="downloadSet" class="secondary" type="button">Set herunterladen</button>
        </div>
        <div id="status" class="status">Noch kein Bild geladen.</div>
      </section>

      <details class="group">
        <summary>Weitere Einstellungen</summary>
        <div class="advanced-grid">
          <div class="inline">
            <div class="field"><label>Linienfarbe</label><input id="lineColor" type="color" value="#000000"></div>
            <div class="field"><label>Feldfarbe</label><input id="fillColor" type="color" value="#ffffff"></div>
          </div>
          <div class="field"><label>Linien- & Zahlen-Deckkraft: <span id="lineOpacityValue">100 %</span></label><input id="lineOpacity" type="range" min="0" max="100" value="100"></div>
          <div class="field"><label>Feld-Deckkraft: <span id="fillOpacityValue">45 %</span></label><input id="fillOpacity" type="range" min="0" max="100" value="45"></div>
          <div class="field"><label>Linienstärke: <span id="lineWidthValue">2 px</span></label><input id="lineWidth" type="range" min="1" max="10" value="2"></div>
          <label class="check"><input id="autoLabelSize" type="checkbox" checked>Schriftgröße automatisch anpassen</label>
          <div class="field"><label>Schriftgröße: <span id="labelSizeValue">automatisch</span></label><input id="labelSize" type="range" min="10" max="48" value="22" disabled></div>
          <div class="field"><label>Zahlenfarbe</label><input id="labelColor" type="color" value="#ffffff"></div>
          <label class="check"><input id="showLabels" type="checkbox" checked>Zahlen anzeigen</label>
          <label class="check"><input id="darkLabels" type="checkbox">Hintergrund hinter Zahlen</label>
          <button id="resetImage" class="secondary" type="button">Bild zurücksetzen</button>
        </div>
      </details>
    </aside>

    <section class="panel stage">
      <canvas id="canvas" width="1200" height="1200"></canvas>
    </section>
  </section>

  <nav class="mobile-toolbar">
    <button id="mImage" class="secondary active" type="button">Bild</button>
    <button id="mGrid" class="secondary" type="button">Raster</button>
    <button id="minus" class="secondary" type="button">−</button>
    <button id="plus" class="secondary" type="button">+</button>
    <button id="center" class="secondary" type="button">Mitte</button>
    <button id="mDownload" class="primary" type="button">PNG</button>
  </nav>
</main>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas = $('canvas'), ctx = canvas.getContext('2d');
  const image = new Image();
  let hasImage = false;

  const controls = {
    imageInput:$('imageInput'), canvasFormat:$('canvasFormat'),
    imageZoom:$('imageZoom'), imageRotation:$('imageRotation'),
    gridSize:$('gridSize'), cellSize:$('cellSize'),
    lineColor:$('lineColor'), fillColor:$('fillColor'),
    lineOpacity:$('lineOpacity'), fillOpacity:$('fillOpacity'),
    lineWidth:$('lineWidth'), labelSize:$('labelSize'), autoLabelSize:$('autoLabelSize'),
    labelColor:$('labelColor'), showLabels:$('showLabels'), darkLabels:$('darkLabels')
  };

  const state = {
    width:1200,height:1200,mode:'image',
    imageScale:1,imageRotation:0,imageX:0,imageY:0,baseScale:1,
    gridSize:10,cellSize:90,gridX:150,gridY:150,
    dragging:null,startX:0,startY:0,startGridX:0,startGridY:0,startCell:0,startImageX:0,startImageY:0
  };

  const handleSize = () => matchMedia('(max-width:900px)').matches ? 62 : 28;
  const gridPixels = () => state.gridSize * state.cellSize;

  function rgba(hex,a){
    const h=hex.replace('#','');
    return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;
  }

  function effectiveLabelSize(){
    if(!controls.autoLabelSize.checked) return +controls.labelSize.value;

    const digits = String(state.gridSize * state.gridSize).length;
    const digitFactor = digits === 1 ? 0.42 : digits === 2 ? 0.34 : 0.28;
    return Math.max(10, Math.min(42, Math.floor(state.cellSize * digitFactor)));
  }

  function updateValues(){
    $('zoomValue').textContent=Math.round(state.imageScale*100)+' %';
    $('rotationValue').textContent=Math.round(state.imageRotation)+'°';
    $('cellSizeValue').textContent=Math.round(state.cellSize)+' px';
    $('lineOpacityValue').textContent=controls.lineOpacity.value+' %';
    $('fillOpacityValue').textContent=controls.fillOpacity.value+' %';
    $('lineWidthValue').textContent=controls.lineWidth.value+' px';
    controls.labelSize.disabled=controls.autoLabelSize.checked;
    $('labelSizeValue').textContent=controls.autoLabelSize.checked
      ? effectiveLabelSize()+' px automatisch'
      : controls.labelSize.value+' px';
    controls.imageZoom.value=Math.round(state.imageScale*100);
    controls.imageRotation.value=Math.round(state.imageRotation);
    controls.cellSize.value=Math.round(state.cellSize);
  }

  function setMode(mode){
    state.mode=mode;
    ['imageMode','mImage'].forEach(id=>$(id).classList.toggle('active',mode==='image'));
    ['gridMode','mGrid'].forEach(id=>$(id).classList.toggle('active',mode==='grid'));
    $('status').textContent=mode==='image'?'Modus: Bild verschieben.':'Modus: Raster verschieben und skalieren.';
  }

  function fitBaseScale(){
    if(hasImage) state.baseScale=Math.min(state.width/image.width,state.height/image.height);
  }

  function clampGrid(){
    const total=gridPixels();
    state.gridX=Math.max(0,Math.min(state.gridX,Math.max(0,state.width-total)));
    state.gridY=Math.max(0,Math.min(state.gridY,Math.max(0,state.height-total)));
  }

  function centerGrid(){
    state.gridX=Math.max(0,(state.width-gridPixels())/2);
    state.gridY=Math.max(0,(state.height-gridPixels())/2);
    clampGrid(); updateValues(); render();
  }

  function drawImage(){
    ctx.fillStyle='#0b0c0f'; ctx.fillRect(0,0,state.width,state.height);
    if(!hasImage){
      ctx.fillStyle='#e8ebf2';ctx.font='700 48px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('Bild auswählen',state.width/2,state.height/2);
      return;
    }
    const s=state.baseScale*state.imageScale;
    ctx.save();
    ctx.translate(state.width/2+state.imageX,state.height/2+state.imageY);
    ctx.rotate(state.imageRotation*Math.PI/180);
    ctx.drawImage(image,-image.width*s/2,-image.height*s/2,image.width*s,image.height*s);
    ctx.restore();
  }

  function drawGrid(includeHandle=true){
    const n=state.gridSize,cs=state.cellSize,gx=state.gridX,gy=state.gridY,total=n*cs;
    ctx.save();
    ctx.fillStyle=rgba(controls.fillColor.value,+controls.fillOpacity.value/100);
    for(let r=0;r<n;r++)for(let c=0;c<n;c++)ctx.fillRect(gx+c*cs,gy+r*cs,cs,cs);

    const shared=+controls.lineOpacity.value/100;
    ctx.strokeStyle=rgba(controls.lineColor.value,shared);
    ctx.lineWidth=+controls.lineWidth.value;
    for(let i=0;i<=n;i++){
      const p=i*cs;
      ctx.beginPath();ctx.moveTo(gx+p,gy);ctx.lineTo(gx+p,gy+total);ctx.stroke();
      ctx.beginPath();ctx.moveTo(gx,gy+p);ctx.lineTo(gx+total,gy+p);ctx.stroke();
    }

    if(controls.showLabels.checked){
      const size=effectiveLabelSize();
      ctx.font=`500 ${size}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
      for(let r=0;r<n;r++)for(let c=0;c<n;c++){
        const num=r*n+c+1,cx=gx+c*cs+cs/2,cy=gy+r*cs+cs/2;
        if(controls.darkLabels.checked){
          const m=ctx.measureText(String(num));
          ctx.fillStyle='rgba(0,0,0,.55)';
          ctx.fillRect(cx-(m.width+12)/2,cy-(size+10)/2,m.width+12,size+10);
        }
        ctx.lineWidth=Math.max(1,size/14);
        ctx.strokeStyle=`rgba(0,0,0,${Math.max(.15,shared*.7)})`;
        ctx.strokeText(String(num),cx,cy);
        ctx.fillStyle=rgba(controls.labelColor.value,shared);
        ctx.fillText(String(num),cx,cy);
      }
    }

    if(includeHandle){
      const hs=handleSize(),hx=gx+total-hs,hy=gy+total-hs;
      ctx.fillStyle='rgba(255,255,255,.94)';ctx.fillRect(hx,hy,hs,hs);
      ctx.strokeStyle='rgba(0,0,0,.9)';ctx.lineWidth=Math.max(2,hs/18);ctx.strokeRect(hx,hy,hs,hs);
      ctx.beginPath();ctx.moveTo(hx+hs*.2,hy+hs*.8);ctx.lineTo(hx+hs*.8,hy+hs*.2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(hx+hs*.42,hy+hs*.8);ctx.lineTo(hx+hs*.8,hy+hs*.42);ctx.stroke();
    }
    ctx.restore();
  }

  function render(includeHandle=true){
    canvas.width=state.width;canvas.height=state.height;
    drawImage();drawGrid(includeHandle);
  }

  function point(e){
    const rect=canvas.getBoundingClientRect();
    return {x:(e.clientX-rect.left)*canvas.width/rect.width,y:(e.clientY-rect.top)*canvas.height/rect.height};
  }

  function onDown(e){
    const p=point(e),total=gridPixels(),hs=handleSize(),pad=matchMedia('(max-width:900px)').matches?40:8;
    state.startX=p.x;state.startY=p.y;
    if(state.mode==='image'){
      state.dragging='image';state.startImageX=state.imageX;state.startImageY=state.imageY;
    }else{
      const hx=state.gridX+total-hs,hy=state.gridY+total-hs;
      const onHandle=p.x>=hx-pad&&p.x<=hx+hs+pad&&p.y>=hy-pad&&p.y<=hy+hs+pad;
      const inside=p.x>=state.gridX&&p.x<=state.gridX+total&&p.y>=state.gridY&&p.y<=state.gridY+total;
      if(onHandle){state.dragging='resize';state.startCell=state.cellSize;}
      else if(inside){state.dragging='grid';state.startGridX=state.gridX;state.startGridY=state.gridY;}
    }
    if(state.dragging){canvas.classList.add('dragging');e.preventDefault();}
  }

  function onMove(e){
    if(!state.dragging)return;
    const p=point(e),dx=p.x-state.startX,dy=p.y-state.startY;
    if(state.dragging==='image'){state.imageX=state.startImageX+dx;state.imageY=state.startImageY+dy;}
    if(state.dragging==='grid'){state.gridX=state.startGridX+dx;state.gridY=state.startGridY+dy;clampGrid();}
    if(state.dragging==='resize'){state.cellSize=Math.max(30,Math.min(220,state.startCell+Math.max(dx,dy)/state.gridSize));clampGrid();}
    updateValues();render();e.preventDefault();
  }
  function onUp(){state.dragging=null;canvas.classList.remove('dragging');}

  function downloadCanvas(name){
    return new Promise((resolve,reject)=>{
      render(false);
      canvas.toBlob(blob=>{
        render(true);
        if(!blob)return reject(new Error('PNG konnte nicht erstellt werden.'));
        const a=document.createElement('a'),url=URL.createObjectURL(blob);
        a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),500);resolve();
      },'image/png');
    });
  }

  controls.imageInput.addEventListener('change',e=>{
    const file=e.target.files?.[0];if(!file)return;
    const url=URL.createObjectURL(file);
    image.onload=()=>{hasImage=true;fitBaseScale();state.imageScale=1;state.imageRotation=0;state.imageX=0;state.imageY=0;updateValues();render();$('status').textContent=file.name+' geladen.';URL.revokeObjectURL(url)};
    image.src=url;
  });

  controls.canvasFormat.addEventListener('change',()=>{
    [state.width,state.height]=controls.canvasFormat.value.split('x').map(Number);
    fitBaseScale();centerGrid();render();
  });
  controls.imageZoom.addEventListener('input',()=>{state.imageScale=+controls.imageZoom.value/100;updateValues();render()});
  controls.imageRotation.addEventListener('input',()=>{state.imageRotation=+controls.imageRotation.value;updateValues();render()});
  controls.gridSize.addEventListener('change',()=>{state.gridSize=+controls.gridSize.value;clampGrid();updateValues();render()});
  controls.cellSize.addEventListener('input',()=>{state.cellSize=+controls.cellSize.value;clampGrid();updateValues();render()});

  ['lineColor','fillColor','lineOpacity','fillOpacity','lineWidth','labelSize','autoLabelSize','labelColor','showLabels','darkLabels'].forEach(id=>{
    controls[id].addEventListener('input',()=>{updateValues();render()});
  });

  $('imageMode').onclick=()=>setMode('image');$('gridMode').onclick=()=>setMode('grid');
  $('mImage').onclick=()=>setMode('image');$('mGrid').onclick=()=>setMode('grid');
  $('centerGrid').onclick=centerGrid;
  $('center').onclick=()=>state.mode==='image'?(state.imageX=0,state.imageY=0,updateValues(),render()):centerGrid();
  $('resetImage').onclick=()=>{state.imageScale=1;state.imageRotation=0;state.imageX=0;state.imageY=0;updateValues();render()};
  $('minus').onclick=()=>{if(state.mode==='image')state.imageScale=Math.max(.1,state.imageScale-.1);else{state.cellSize=Math.max(30,state.cellSize-5);clampGrid()}updateValues();render()};
  $('plus').onclick=()=>{if(state.mode==='image')state.imageScale=Math.min(4,state.imageScale+.1);else{state.cellSize=Math.min(220,state.cellSize+5);clampGrid()}updateValues();render()};

  $('download').onclick=async()=>{if(!hasImage)return $('status').textContent='Bitte zuerst ein Bild laden.';await downloadCanvas(`image-grid-${state.gridSize}x${state.gridSize}.png`)};
  $('mDownload').onclick=()=>$('download').click();

  $('downloadSet').onclick=async()=>{
    if(!hasImage)return $('status').textContent='Bitte zuerst ein Bild laden.';
    const original={fill:controls.fillOpacity.value,line:controls.lineOpacity.value,label:controls.labelColor.value};
    try{
      controls.fillOpacity.value='100';controls.lineOpacity.value='100';controls.labelColor.value='#000000';updateValues();render();
      await downloadCanvas(`image-grid-${state.gridSize}x${state.gridSize}-100.png`);
      await new Promise(r=>setTimeout(r,150));
      controls.fillOpacity.value='0';controls.lineOpacity.value='50';controls.labelColor.value='#ffffff';updateValues();render();
      await downloadCanvas(`image-grid-${state.gridSize}x${state.gridSize}-0.png`);
      $('status').textContent='Set wurde erstellt.';
    }finally{
      controls.fillOpacity.value=original.fill;controls.lineOpacity.value=original.line;controls.labelColor.value=original.label;updateValues();render();
    }
  };

  canvas.addEventListener('pointerdown',onDown);
  window.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp);
  window.addEventListener('pointercancel',onUp);

  updateValues();centerGrid();setMode('image');render();
})();
</script>
</body>
</html>
